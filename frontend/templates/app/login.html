{% extends "base.html" %}

{% block content %}
<div class="center-stage">
  <div class="auth-card">
    <header>
      <h2>Login</h2>
      <p class="subtitle">Access your account</p>
    </header>

    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input name="username" required minlength="3" autocomplete="username" placeholder="Enter your username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-input-wrapper">
          <input id="passwordInput" name="password" type="password" required minlength="4" autocomplete="current-password" placeholder="••••••••" />
          <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
            <span class="eye-icon">👁️</span>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary full-width">Login</button>
    </form>

    <p class="hint">
      New here? <a href="/app/register">Create an account</a>
    </p>

    <div id="message" class="message" aria-live="polite"></div>
  </div>
</div>
{% endblock %}
