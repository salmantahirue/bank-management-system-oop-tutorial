{% extends "base.html" %}

{% block content %}
<div class="content-container">
  <header class="page-header">
    <h1>Interview Preparation Questions</h1>
    <p class="lead" id="difficultyLabel">Loading questions...</p>
  </header>

  <div class="difficulty-selector">
    <a href="/learn/interview/preparation?difficulty=easy" class="btn btn-sm btn-outline">Easy</a>
    <a href="/learn/interview/preparation?difficulty=medium" class="btn btn-sm btn-outline">Medium</a>
    <a href="/learn/interview/preparation?difficulty=hard" class="btn btn-sm btn-outline">Hard</a>
    <a href="/learn/interview/preparation?difficulty=expert" class="btn btn-sm btn-outline">Expert</a>
  </div>

  <div id="questionsContainer">
    <p>Loading questions...</p>
  </div>

  <!-- Modal for Detailed Answer -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalQuestion"></h2>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Detailed content will be inserted here -->
      </div>
    </div>
  </div>

  <section class="call-to-action">
    <a href="/learn/interview" class="btn btn-secondary">← Back to Interview Prep</a>
    <a href="/learn/interview/assessment" class="btn btn-primary">Take Assessment →</a>
  </section>
</div>

<script>
// Get difficulty from URL
const urlParams = new URLSearchParams(window.location.search);
const difficulty = urlParams.get('difficulty') || 'easy';

// Update label
document.getElementById('difficultyLabel').textContent = `${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)} Level Questions`;

// Modal elements
const modal = document.getElementById('detailModal');
const closeModal = document.getElementById('closeModal');

// Close modal when clicking X or outside
closeModal.addEventListener('click', () => {
  modal.style.display = 'none';
});

window.addEventListener('click', (e) => {
  if (e.target === modal) {
    modal.style.display = 'none';
  }
});

// Store questions globally for modal access
let allQuestions = [];

// Function to show detailed answer in modal
function showDetails(questionIndex) {
  const question = allQuestions[questionIndex];
  document.getElementById('modalQuestion').textContent = question.question;
  const modalBody = document.getElementById('modalBody');
  modalBody.innerHTML = `
    <div class="answer-type">
      <strong>📖 Detailed Explanation:</strong>
      <p>${question.detailed_explanation}</p>
    </div>
    
    <div class="answer-type">
      <strong>🌍 Real-World Analogy:</strong>
      <p>${question.analogy}</p>
    </div>
    
    <div class="answer-type">
      <strong>💻 Code Example:</strong>
      <pre><code class="language-python">${escapeHtml(question.code_example)}</code></pre>
    </div>
    
    <div class="answer-type highlight-box">
      <strong>🏦 How We Use This in Our Project:</strong>
      <p>${question.project_usage}</p>
    </div>
  `;
  modal.style.display = 'flex';
  
  // Re-highlight code after modal opens
  setTimeout(() => {
    if (window.Prism) {
      Prism.highlightAll();
    }
  }, 100);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Load questions
fetch(`/api/interview/questions?difficulty=${difficulty}`)
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    allQuestions = data.questions || [];
    
    if (allQuestions.length > 0) {
      allQuestions.forEach((q, index) => {
        const questionCard = document.createElement('div');
        questionCard.className = 'question-card';
        questionCard.innerHTML = `
          <div class="question-header">
            <span class="question-number">Q${index + 1}</span>
            <h3>${q.question}</h3>
          </div>
          
          <div class="answer-section">
            <div class="short-answer-box">
              <div class="answer-label">📝 Short Interview Answer:</div>
              <p class="short-answer-text">${q.short_answer}</p>
              <button class="btn btn-outline btn-detail" data-question-index="${index}">
                More Detail →
              </button>
            </div>
          </div>
        `;
        container.appendChild(questionCard);
        
        // Add event listener to the button
        const btn = questionCard.querySelector('.btn-detail');
        btn.addEventListener('click', () => showDetails(index));
      });
    } else {
      container.innerHTML = '<p>No questions found for this difficulty level.</p>';
    }
  })
  .catch(err => {
    document.getElementById('questionsContainer').innerHTML = 
      '<p class="message err">Error loading questions. Please try again.</p>';
  });
</script>
{% endblock %}
